name: Manifest Provider Removal Test

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "owner/repo holding the split APKs"
        required: true
        default: "instafel/source-apks"
      release_tag:
        description: "Release tag (leave blank for latest)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install lxml
        run: |
          pip install lxml --quiet

      - name: Download split APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p splits

          if [ -n "${{ inputs.release_tag }}" ]; then
            gh release download "${{ inputs.release_tag }}" \
              --repo "${{ inputs.source_repo }}" \
              --dir splits \
              --pattern "*.apk"
          else
            gh release download \
              --repo "${{ inputs.source_repo }}" \
              --dir splits \
              --pattern "*.apk"
          fi

          echo "Downloaded APKs:"
          ls -lah splits

      - name: Download APKEditor
        run: |
          API_URL="https://api.github.com/repos/REAndroid/APKEditor/releases/latest"
          ASSET_URL=$(curl -s "$API_URL" | grep "browser_download_url.*\.jar" | cut -d '"' -f4)
          wget -q "$ASSET_URL" -O APKEditor.jar

      - name: Merge split APKs
        run: |
          java -jar APKEditor.jar m \
            -i splits \
            -o merged.apk

      - name: Download Apktool 2.12.1
        run: |
          wget -q \
          https://github.com/iBotPeaches/Apktool/releases/download/v2.12.1/apktool_2.12.1.jar \
          -O apktool.jar

      - name: Decode merged APK
        run: |
          java -jar apktool.jar d merged.apk -o decoded -f

            - name: Remove offending provider
        run: |
          python3 <<'PYEOF'
          from lxml import etree

          NS = "{http://schemas.android.com/apk/res/android}"
          AUTHORITY = "com.facebook.pages.app.ig4work.tokenhandoff"

          tree = etree.parse("decoded/AndroidManifest.xml")
          root = tree.getroot()

          removed = 0

          for provider in root.xpath("//*[local-name()='provider']"):
              if provider.get(NS + "authorities") == AUTHORITY:
                  provider.getparent().remove(provider)
                  removed += 1

          tree.write(
              "decoded/AndroidManifest.xml",
              encoding="utf-8",
              xml_declaration=True,
              pretty_print=True
          )

          print(f"Removed {removed} provider(s).")

          if removed == 0:
              print("===== Providers found =====")
              for provider in root.xpath("//*[local-name()='provider']"):
                  print(provider.get(NS + "authorities"))
              raise RuntimeError("Provider not found!")
          PYEOF

      - name: Verify removal
        run: |
          if grep -q "com.facebook.pages.app.ig4work.tokenhandoff" decoded/AndroidManifest.xml; then
            echo "Provider still exists!"
            exit 1
          fi

          echo "Provider removed successfully."

      - name: Recompile (Force AAPT1)
        run: |
          java -jar apktool.jar b decoded \
            --use-aapt1 \
            -o rebuilt.apk

      - name: Delete previous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete provider-removal-test -y || true
          git push origin :refs/tags/provider-removal-test || true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: provider-removal-test
          name: Provider Removal Test
          body: |
            Rebuilt APK after removing:
            com.facebook.pages.app.ig4work.tokenhandoff
          files: rebuilt.apk
          generate_release_notes: false