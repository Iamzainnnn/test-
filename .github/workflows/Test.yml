name: Dump Binary AndroidManifest (AAPT2)

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "owner/repo containing the GitHub Release"
        required: true
        default: "instafel/source-apks"
      release_tag:
        description: "Release tag (leave blank for latest)"
        required: false
        default: ""

jobs:
  dump-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Download base.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apks

          if [ -n "${{ inputs.release_tag }}" ]; then
            gh release download "${{ inputs.release_tag }}" \
              --repo "${{ inputs.source_repo }}" \
              --dir apks \
              --pattern "base.apk"
          else
            gh release download \
              --repo "${{ inputs.source_repo }}" \
              --dir apks \
              --pattern "base.apk"
          fi

          echo "Downloaded APK:"
          ls -lah apks

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Tools
        run: |
          yes | sdkmanager "build-tools;36.0.0"

      - name: Locate aapt2
        run: |
          AAPT2=$(find "$ANDROID_SDK_ROOT/build-tools" -name aapt2 | head -n1)
          echo "AAPT2=$AAPT2" >> $GITHUB_ENV
          echo "Using: $AAPT2"

      - name: Dump Binary AndroidManifest
        run: |
          "$AAPT2" dump xmltree apks/base.apk AndroidManifest.xml > manifest_xmltree.txt

      - name: Show tokenhandoff section
        run: |
          grep -n -A20 -B20 "tokenhandoff" manifest_xmltree.txt || true

      - name: Upload xmltree
        uses: actions/upload-artifact@v4
        with:
          name: manifest-xmltree
          path: manifest_xmltree.txt