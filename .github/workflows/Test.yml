name: Manifest Provider Debug

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'owner/repo holding the split APKs (as a GitHub release)'
        required: true
        default: 'instafel/source-apks'
      release_tag:
        description: 'Release tag to pull from (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  debug-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install lxml
        run: pip install lxml --quiet

      - name: Download split APKs from source repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p splits
          if [ -n "${{ inputs.release_tag }}" ]; then
            gh release download "${{ inputs.release_tag }}" --repo "${{ inputs.source_repo }}" --dir splits --pattern "*.apk"
          else
            gh release download --repo "${{ inputs.source_repo }}" --dir splits --pattern "*.apk"
          fi
          ls -la splits

      - name: Download APKEditor (latest)
        run: |
          API_URL="https://api.github.com/repos/REAndroid/APKEditor/releases/latest"
          ASSET_URL=$(curl -s "$API_URL" | grep "browser_download_url.*\.jar" | cut -d '"' -f4)
          wget -q "$ASSET_URL" -O APKEditor.jar

      - name: Merge split APKs
        run: java -jar APKEditor.jar m -i splits -o merged.apk

      - name: Download Apktool 2.12.1
        run: wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.12.1/apktool_2.12.1.jar -O apktool.jar

      - name: Decode merged APK
        run: java -jar apktool.jar d merged.apk -o decoded -f

      - name: Detect providers missing android:name
        run: |
          python3 <<'PYEOF'
          from lxml import etree

          NS = "{http://schemas.android.com/apk/res/android}"
          path = "decoded/AndroidManifest.xml"

          tree = etree.parse(path)
          root = tree.getroot()

          out_lines = []
          count = 0

          for provider in root.iter("provider"):
              if provider.get(NS + "name"):
                  continue
              count += 1
              line = provider.sourceline
              out_lines.append(f"--- Offending <provider> #{count} at line {line} ---")
              out_lines.append(etree.tostring(provider, pretty_print=True).decode())
              out_lines.append("")

          if count == 0:
              out_lines.append("No <provider> tags missing android:name found.")

          with open("manifest_provider_issues.txt", "w") as f:
              f.write("\n".join(out_lines))

          print(f"Found {count} offending provider tag(s).")
          PYEOF

      - name: Show output
        run: cat manifest_provider_issues.txt

      - name: Commit and push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p debug-output
          cp manifest_provider_issues.txt debug-output/manifest_provider_issues.txt
          git add debug-output/manifest_provider_issues.txt
          git commit -m "Add manifest provider debug output [skip ci]" || echo "Nothing to commit"
          git push
