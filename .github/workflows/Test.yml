name: Extract Original AndroidManifest

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "owner/repo containing the GitHub Release"
        required: true
        default: "instafel/source-apks"
      release_tag:
        description: "Release tag (leave blank for latest)"
        required: false
        default: ""

jobs:
  extract-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Download base.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir apks

          if [ -n "${{ inputs.release_tag }}" ]; then
            gh release download "${{ inputs.release_tag }}" \
              --repo "${{ inputs.source_repo }}" \
              --dir apks \
              --pattern "base.apk"
          else
            gh release download \
              --repo "${{ inputs.source_repo }}" \
              --dir apks \
              --pattern "base.apk"
          fi

          ls -lah apks

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Print original AndroidManifest
        run: |
          apkanalyzer manifest print apks/base.apk > AndroidManifest.xml

      - name: Show provider
        run: |
          grep -n -A10 -B10 "tokenhandoff" AndroidManifest.xml || true

      - name: Upload Manifest
        uses: actions/upload-artifact@v4
        with:
          name: original-manifest
          path: AndroidManifest.xml