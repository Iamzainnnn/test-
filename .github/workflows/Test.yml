name: Dump Binary AndroidManifest (AAPT1)

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "owner/repo containing the GitHub Release"
        required: true
        default: "instafel/source-apks"
      release_tag:
        description: "Release tag (leave blank for latest)"
        required: false
        default: ""

jobs:
  dump-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Download base.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p apks

          if [ -n "${{ inputs.release_tag }}" ]; then
            gh release download "${{ inputs.release_tag }}" \
              --repo "${{ inputs.source_repo }}" \
              --dir apks \
              --pattern "base.apk"
          else
            gh release download \
              --repo "${{ inputs.source_repo }}" \
              --dir apks \
              --pattern "base.apk"
          fi

          echo "Downloaded APK:"
          ls -lah apks

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          yes | sdkmanager "build-tools;34.0.0"

      - name: Locate aapt
        run: |
          AAPT=$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name aapt | head -n1)

          if [ -z "$AAPT" ]; then
            echo "aapt not found!"
            find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 2
            exit 1
          fi

          echo "Using aapt:"
          echo "$AAPT"

          echo "AAPT=$AAPT" >> $GITHUB_ENV

      - name: Dump AndroidManifest.xml
        run: |
          "$AAPT" dump xmltree apks/base.apk AndroidManifest.xml > manifest_xmltree.txt

      - name: Search tokenhandoff
        run: |
          grep -n -A30 -B30 "tokenhandoff" manifest_xmltree.txt || true

      - name: Print first 300 lines
        run: |
          head -300 manifest_xmltree.txt

      - name: Upload xmltree
        uses: actions/upload-artifact@v4
        with:
          name: manifest-xmltree
          path: manifest_xmltree.txt